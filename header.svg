<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wrap { font-family: 'Courier New', Courier, monospace; }

      /* scan line */
      .scan { animation: scan 5s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(0px);   opacity: 0.6; }
        90%  { transform: translateY(200px); opacity: 0.6; }
        100% { transform: translateY(200px); opacity: 0; }
      }

      /* AP block pulse */
      .ap-rect { animation: pulse-border 3s ease-in-out infinite; }
      .ap-text  { animation: pulse-text 3s ease-in-out infinite; }
      @keyframes pulse-border {
        0%,100% { stroke: #5DCAA5; stroke-opacity: 1; }
        50%      { stroke: #5DCAA5; stroke-opacity: 0.4; }
      }
      @keyframes pulse-text {
        0%,100% { fill-opacity: 1; }
        50%      { fill-opacity: 0.4; }
      }

      /* typing cursor */
      .cursor { animation: blink 0.8s step-end 3s 5; animation-fill-mode: forwards; }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50%      { opacity: 0; }
      }

      /* name reveal (clip grows) */
      .name-clip { animation: reveal-name 1.6s steps(18, end) 0.4s forwards; }
      @keyframes reveal-name {
        from { width: 0px; }
        to   { width: 440px; }
      }

      /* divider expand */
      .divider { animation: expand 0.7s ease-out 2.2s forwards; transform-origin: 92px 90px; transform: scaleX(0); }
      @keyframes expand {
        to { transform: scaleX(1); }
      }

      /* dots blink */
      .d1 { animation: dblink 1.2s ease-in-out infinite 0s; }
      .d2 { animation: dblink 1.2s ease-in-out infinite 0.2s; }
      .d3 { animation: dblink 1.2s ease-in-out infinite 0.4s; }
      @keyframes dblink {
        0%,100% { opacity: 0.15; }
        50%      { opacity: 1; }
      }

      /* tag fade in */
      .t1 { animation: fade 0.4s ease forwards 2.5s; opacity: 0; }
      .t2 { animation: fade 0.4s ease forwards 2.8s; opacity: 0; }
      .t3 { animation: fade 0.4s ease forwards 3.1s; opacity: 0; }
      @keyframes fade {
        to { opacity: 1; }
      }

      /* stat cards slide up */
      .s1 { animation: slideup 0.5s ease forwards 3.3s; opacity: 0; }
      .s2 { animation: slideup 0.5s ease forwards 3.5s; opacity: 0; }
      .s3 { animation: slideup 0.5s ease forwards 3.7s; opacity: 0; }
      .s4 { animation: slideup 0.5s ease forwards 3.9s; opacity: 0; }
      @keyframes slideup {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
    <clipPath id="name-clip">
      <rect class="name-clip" x="92" y="44" width="0" height="46"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="860" height="200" fill="#0a0a0f"/>

  <!-- grid lines horizontal -->
  <line x1="0" y1="40"  x2="860" y2="40"  stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="80"  x2="860" y2="80"  stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="860" y2="120" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="860" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <!-- grid lines vertical -->
  <line x1="172" y1="0" x2="172" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="344" y1="0" x2="344" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="516" y1="0" x2="516" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="688" y1="0" x2="688" y2="200" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>

  <!-- scan line -->
  <rect class="scan" x="0" y="0" width="860" height="1" fill="#5DCAA5" fill-opacity="0.2"/>

  <!-- corner brackets -->
  <polyline points="20,28 20,20 28,20" fill="none" stroke="#5DCAA5" stroke-width="1.5"/>
  <polyline points="832,172 832,180 824,180" fill="none" stroke="#5DCAA5" stroke-width="1.5"/>

  <!-- blinking dots -->
  <circle class="d1" cx="20" cy="12" r="3" fill="#5DCAA5"/>
  <circle class="d2" cx="30" cy="12" r="3" fill="#5DCAA5"/>
  <circle class="d3" cx="40" cy="12" r="3" fill="#5DCAA5"/>

  <!-- AP block -->
  <rect class="ap-rect" x="20" y="44" width="60" height="48" rx="2" fill="none" stroke="#5DCAA5" stroke-width="1.5"/>
  <rect x="20" y="44" width="60" height="48" rx="2" fill="#5DCAA5" fill-opacity="0.07"/>
  <text class="ap-text" x="50" y="74" font-family="'Courier New',monospace" font-size="18" font-weight="700" fill="#5DCAA5" text-anchor="middle">AP</text>

  <!-- name (revealed by clip) -->
  <text clip-path="url(#name-clip)" x="92" y="82" font-family="'Courier New',monospace" font-size="32" font-weight="700" fill="#f0f0f0" letter-spacing="-1">Aayush Prajapati</text>

  <!-- typing cursor -->
  <rect class="cursor" x="528" y="50" width="2" height="34" fill="#5DCAA5"/>

  <!-- divider line -->
  <line class="divider" x1="92" y1="100" x2="820" y2="100" stroke="#5DCAA5" stroke-width="0.5" stroke-opacity="0.45"/>

  <!-- tagline tags -->
  <text class="t1" x="92"  y="120" font-family="'Courier New',monospace" font-size="11" fill="#5DCAA5" letter-spacing="3">DEVELOPER</text>
  <text class="t2" x="230" y="120" font-family="'Courier New',monospace" font-size="11" fill="#5DCAA5" letter-spacing="3">· BUILDER</text>
  <text class="t3" x="360" y="120" font-family="'Courier New',monospace" font-size="11" fill="#5DCAA5" letter-spacing="3">· OPEN SOURCE</text>

  <!-- stat card 1 -->
  <g class="s1">
    <rect x="92" y="134" width="90" height="46" rx="2" fill="none" stroke="#5DCAA5" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="137" y="155" font-family="'Courier New',monospace" font-size="17" font-weight="700" fill="#5DCAA5" text-anchor="middle">∞</text>
    <text x="137" y="170" font-family="'Courier New',monospace" font-size="9"  fill="#ffffff" fill-opacity="0.3" text-anchor="middle" letter-spacing="2">COMMITS</text>
  </g>

  <!-- stat card 2 -->
  <g class="s2">
    <rect x="192" y="134" width="90" height="46" rx="2" fill="none" stroke="#5DCAA5" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="237" y="155" font-family="'Courier New',monospace" font-size="17" font-weight="700" fill="#5DCAA5" text-anchor="middle">01</text>
    <text x="237" y="170" font-family="'Courier New',monospace" font-size="9"  fill="#ffffff" fill-opacity="0.3" text-anchor="middle" letter-spacing="2">MISSION</text>
  </g>

  <!-- stat card 3 -->
  <g class="s3">
    <rect x="292" y="134" width="90" height="46" rx="2" fill="none" stroke="#5DCAA5" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="337" y="155" font-family="'Courier New',monospace" font-size="17" font-weight="700" fill="#5DCAA5" text-anchor="middle">24/7</text>
    <text x="337" y="170" font-family="'Courier New',monospace" font-size="9"  fill="#ffffff" fill-opacity="0.3" text-anchor="middle" letter-spacing="2">BUILDING</text>
  </g>

  <!-- stat card 4 -->
  <g class="s4">
    <rect x="392" y="134" width="90" height="46" rx="2" fill="none" stroke="#5DCAA5" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="437" y="155" font-family="'Courier New',monospace" font-size="17" font-weight="700" fill="#5DCAA5" text-anchor="middle">100%</text>
    <text x="437" y="170" font-family="'Courier New',monospace" font-size="9"  fill="#ffffff" fill-opacity="0.3" text-anchor="middle" letter-spacing="2">PASSION</text>
  </g>

  <!-- right arc decoration -->
  <path d="M 780 30 A 90 90 0 0 1 850 110" fill="none" stroke="#5DCAA5" stroke-opacity="0.2" stroke-width="0.5"/>
  <path d="M 800 18 A 110 110 0 0 1 860 128" fill="none" stroke="#5DCAA5" stroke-opacity="0.1" stroke-width="0.5"/>
  <circle cx="810" cy="65" r="3" fill="#5DCAA5" fill-opacity="0.5"/>
  <circle cx="830" cy="95" r="1.5" fill="#5DCAA5" fill-opacity="0.35"/>
</svg>
